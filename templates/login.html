{% extends "base.html" %}

{% block content %}

<h1>Вход</h1>

<form method="post">
    {{ form.hidden_tag() }}

    <div class="mb-3">
        {{ form.email.label }}
        {{ form.email(class="form-control") }}
    </div>

    <div class="mb-3">
        {{ form.password.label }}
        {{ form.password(class="form-control") }}
    </div>

    <button class="btn btn-primary">Войти</button>
</form>

{% endblock %}
