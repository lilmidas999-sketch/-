{% extends "base.html" %}

{% block content %}

<h1>Музыкальный блог</h1>

{% for post in posts %}

<div class="card mb-3 shadow-sm">

    <div class="card-body">

        <div class="d-flex justify-content-between align-items-start">

            <h4 class="mb-2">{{ post.title }}</h4>

            <a href="/post_delete/{{ post.id }}" class="btn btn-sm btn-danger">
                Удалить
            </a>

        </div>

        <p class="mb-2 text-secondary">
            {{ post.content }}
        </p>

        <div class="d-flex justify-content-between">

            <span class="badge bg-dark">
                Автор: {{ post.author }}
            </span>

            {% if post.user_id %}
                <span class="badge bg-success">
                    Автор зарегистрирован
                </span>
            {% else %}
                <span class="badge bg-secondary">
                    Гость
                </span>
            {% endif %}

        </div>

    </div>

</div>

{% endfor %}

{% endblock %}
